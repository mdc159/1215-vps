name: localai

networks:
  localai-data:
    name: localai-data
  localai-app:
    name: localai-app

services:
  # Local AI Package services.
  caddy:
    networks: [localai-app, localai-data]
  flowise:
    networks: [localai-app]
  open-webui:
    networks: [localai-app]
  n8n:
    networks: [localai-app, localai-data]
  qdrant:
    networks: [localai-app, localai-data]
  neo4j:
    networks: [localai-app, localai-data]
  langfuse-worker:
    networks: [localai-app, localai-data]
  langfuse-web:
    networks: [localai-app, localai-data]
  clickhouse:
    networks: [localai-data]
  minio:
    networks: [localai-app, localai-data]
  postgres:
    networks: [localai-data]
  redis:
    networks: [localai-app, localai-data]
  searxng:
    networks: [localai-app]
  ollama-cpu:
    networks: [localai-app]
  ollama-gpu:
    networks: [localai-app]
  ollama-gpu-amd:
    networks: [localai-app]
  ollama-pull-llama-cpu:
    networks: [localai-app]
  ollama-pull-llama-gpu:
    networks: [localai-app]
  ollama-pull-llama-gpu-amd:
    networks: [localai-app]

  # Supabase services. Service names drift across upstream versions; keep this
  # list additive and prune any undefined names if layered config reports them.
  kong:
    networks: [localai-app, localai-data]
  studio:
    networks: [localai-app, localai-data]
  db:
    networks: [localai-data]
  auth:
    networks: [localai-data]
  storage:
    networks: [localai-data]
  realtime:
    networks: [localai-data]
  meta:
    networks: [localai-data]
  rest:
    networks: [localai-data]
  functions:
    networks: [localai-data]
  edge-functions:
    networks: [localai-data]
  imgproxy:
    networks: [localai-data]
  analytics:
    networks: [localai-data]
  vector:
    networks: [localai-data]
  pooler:
    networks: [localai-data]

  db-init:
    build:
      context: ./services/db-init
    networks: [localai-data]
    depends_on:
      db:
        condition: service_healthy
        required: false
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      HONCHO_DB_PASSWORD: ${HONCHO_DB_PASSWORD}
      BROKER_APP_PASSWORD: ${BROKER_APP_PASSWORD}
    restart: "no"

  mc-init:
    image: minio/mc:latest
    networks: [localai-data]
    depends_on:
      minio:
        condition: service_healthy
        required: false
    entrypoint: /bin/sh
    command: /init.sh
    volumes:
      - ./services/mc-init/init.sh:/init.sh:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: "no"
