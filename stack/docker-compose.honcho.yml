services:
  honcho-api:
    build:
      context: ../modules/honcho
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    env_file:
      - ./env/rendered/honcho.env
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    networks: [localai-app, localai-data]
    restart: unless-stopped

  honcho-deriver:
    build:
      context: ../modules/honcho
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      db:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    env_file:
      - ./env/rendered/honcho.env
    networks: [localai-app, localai-data]
    restart: unless-stopped
